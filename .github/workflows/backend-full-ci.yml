name: Backend Full CI

on:
  pull_request:
    paths:
      - 'Backend/**'
  push:
    branches: [main]
    paths:
      - 'Backend/**'

defaults:
  run:
    working-directory: ./Backend

jobs:
  type-check:
    runs-on: ubuntu-latest
    name: Type Checking
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'Backend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type checking
        run: |
          echo "Running TypeScript type checking..."
          npx tsc --noEmit --pretty
          TSC_EXIT_CODE=$?
          if [ $TSC_EXIT_CODE -ne 0 ]; then
            echo "❌ TypeScript detected type errors!"
            exit 1
          else
            echo "✅ TypeScript type checking passed!"
          fi

  build-project:
    runs-on: ubuntu-latest
    name: Build Validation
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'Backend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: |
          echo "Building the project..."
          npm run build
          BUILD_EXIT_CODE=$?
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "❌ Build failed!"
            exit 1
          else
            echo "✅ Build successful!"
          fi

      - name: Verify build output
        run: |
          echo "Verifying build output..."
          if [ ! -d "dist" ]; then
            echo "❌ Build failed: dist directory not found"
            exit 1
          fi
          
          if [ -z "$(ls -A dist/ 2>/dev/null)" ]; then
            echo "❌ Build failed: dist directory is empty"
            exit 1
          fi
          
          FILE_COUNT=$(find dist/ -type f | wc -l)
          echo "✅ Build verified: $FILE_COUNT files generated in dist/"

  test-dependencies:
    runs-on: ubuntu-latest
    name: Dependency Analysis
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          echo "Installing dependencies..."
          npm ci
          INSTALL_EXIT_CODE=$?
          if [ $INSTALL_EXIT_CODE -ne 0 ]; then
            echo "❌ Dependency installation failed!"
            exit 1
          else
            echo "✅ Dependencies installed successfully!"
          fi

      - name: Validate dependency integrity
        run: |
          echo "Validating dependency integrity..."
          if [ ! -f "package-lock.json" ]; then
            echo "❌ package-lock.json not found!"
            exit 1
          fi
          
          npm ls --depth=0 > /dev/null
          LS_EXIT_CODE=$?
          if [ $LS_EXIT_CODE -ne 0 ]; then
            echo "❌ Dependency tree validation failed!"
            npm ls --depth=0
            exit 1
          else
            echo "✅ Dependency tree validation passed!"
          fi

  startup-validation:
    runs-on: ubuntu-latest
    name: Startup Validation
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'Backend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Validate application startup
        run: |
          echo "Testing application startup..."
          
          # Create a temporary .env file for testing if needed
          if [ -f ".env.example" ]; then
            cp .env.example .env.test
          else
            touch .env.test
            echo "NODE_ENV=test" >> .env.test
            echo "PORT=3001" >> .env.test
          fi
          
          # Start the application in the background
          timeout 30s node dist/main.js &
          APP_PID=$!
          
          # Wait for the app to attempt startup
          sleep 15
          
          # Check if the process is still running (successful startup) or has failed
          if ps -p $APP_PID > /dev/null; then
            echo "✅ Application started successfully"
            kill $APP_PID 2>/dev/null || true
          elif kill -0 $APP_PID 2>/dev/null; then
            echo "✅ Application running (PID still active)"
            kill $APP_PID 2>/dev/null || true
          else
            # Process has exited - check exit code
            wait $APP_PID 2>/dev/null
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 124 ]; then  # timeout command exit code
              echo "✅ Application started and running (timeout reached)"
            else
              echo "❌ Application failed to start properly (exit code: $EXIT_CODE)"
              # Try to show recent logs if possible
              echo "Last few lines of output (if available):"
              tail -n 20 nohup.out 2>/dev/null || echo "No log file available"
              exit 1
            fi
          fi

  final-validation:
    runs-on: ubuntu-latest
    name: Final Validation
    needs: [type-check, build-project, test-dependencies, startup-validation]
    steps:
      - name: Confirm all validations passed
        run: |
          echo "🎉 All CI validations passed successfully!"
          echo "✅ Type checking"
          echo "✅ Build validation" 
          echo "✅ Dependency analysis"
          echo "✅ Startup validation"
          echo ""
          echo "Pipeline ready for merge 🚀"