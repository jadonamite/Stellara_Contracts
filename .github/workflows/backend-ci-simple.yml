name: Backend CI

on:
  pull_request:
    paths:
      - 'Backend/**'
      - '.github/workflows/backend-ci-simple.yml'
  push:
    branches: [main]
    paths:
      - 'Backend/**'
      - '.github/workflows/backend-ci-simple.yml'

defaults:
  run:
    working-directory: ./Backend

jobs:
  ci-checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        check: [build, type-check, startup-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'Backend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build check
        if: matrix.check == 'build'
        run: |
          npm run build
          # Verify build succeeded by checking if dist directory exists and isn't empty
          if [ ! -d "dist" ] || [ -z "$(ls -A dist/)" ]; then
            echo "Build failed or dist directory is empty"
            exit 1
          fi
          echo "Build successful with $(ls -la dist/ | grep '^-' | wc -l) files generated"

      - name: Type checking
        if: matrix.check == 'type-check'
        run: npx tsc --noEmit

      - name: Startup test
        if: matrix.check == 'startup-test'
        run: |
          # Build the project first
          npm run build
          
          # Test if the application can start without crashing
          timeout 30s node dist/main.js &
          APP_PID=$!
          
          # Wait a moment for the app to start
          sleep 10
          
          # Check if the process is still running (indicating successful startup)
          if ps -p $APP_PID > /dev/null; then
            echo "Application started successfully"
            kill $APP_PID 2>/dev/null || true
          else
            echo "Application failed to start properly"
            exit 1
          fi